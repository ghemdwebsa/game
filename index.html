<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غمد | الفعاليات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-brown: #33211a;
            --cream-bg: #f4ece1;
            --olive: #6B6B4B;
            --gold: #d4a373;
            --white: #ffffff;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--cream-bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: var(--dark-brown);
        }

        header {
            background: var(--dark-brown);
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .logo-text {
            color: var(--white);
            font-size: 2rem;
            font-weight: 900;
            margin: 0;
        }

        .welcome-section {
            text-align: center;
            padding: 40px 20px;
        }

        .welcome-section h1 {
            font-weight: 900;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 600px;
            margin: 0 auto 50px;
            padding: 0 20px;
        }

        .event-card {
            background: var(--white);
            border-radius: 25px;
            padding: 30px 15px;
            text-align: center;
            text-decoration: none;
            color: var(--dark-brown);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid transparent;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        /* ألوان الكروت حسب الصورة */
        .card-brown { background-color: var(--dark-brown); color: var(--white); }
        .card-olive { background-color: var(--olive); color: var(--white); }
        .card-white { background-color: var(--white); color: var(--dark-brown); }
        .card-gold  { background-color: var(--gold); color: var(--white); }

        .event-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .event-card h3 {
            margin: 0;
            font-weight: 900;
            font-size: 1.3rem;
        }

        .event-card span {
            font-size: 0.8rem;
            margin-top: 5px;
            opacity: 0.8;
        }

        footer {
            background: var(--dark-brown);
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: auto;
            font-size: 0.9rem;
        }

        @media (max-width: 480px) {
            .grid-container { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .icon { font-size: 2.5rem; }
            .event-card h3 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-text">غَمْد</div>
</header>

<div class="welcome-section">
    <h1>غمد | الفعاليات</h1>
    <p>اختر تحديك المفضل وابدأ اللعب فوراً</p>
</div>

<div class="grid-container">
    <a href="imagine.html" class="event-card card-brown">
        <div class="icon">🖐️</div>
        <h3>اذكر خمسة</h3>
        <span>15 ثانيةً</span>
    </a>

    <a href="letters.html" class="event-card card-olive">
        <div class="icon">🧩</div>
        <h3>تحدي الحروف</h3>
        <span>5 ثوانٍ</span>
    </a>

    <a href="colors.html" class="event-card card-white" style="border: 1px solid #ddd;">
        <div class="icon">🎨</div>
        <h3>تحدي الألوان</h3>
        <span>3 ثوانٍ</span>
    </a>

    <a href="treasure.html" class="event-card card-gold">
        <div class="icon">🔍</div>
        <h3>البحث عن الكنز</h3>
        <span>قوة ملاحظة</span>
    </a>
</div>

<footer>جميع الحقوق محفوظة لمتجر غمد &copy; 2026</footer>

</body>
</html>
